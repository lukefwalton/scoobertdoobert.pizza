name: Bug report
description: Something on the site is broken — a dead link, audio that won't play, a floor that won't render.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill in what you can — it all helps.

        Found a **security vulnerability** (the `api/` functions, the
        leaderboard, anything touching stored emails)? Don't file it here — see
        [SECURITY.md](https://github.com/lukefwalton/scoobertdoobert.pizza/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click / order / descend …
        3. See …
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Where does it happen?
      options:
        - The plain storefront (or with JavaScript off)
        - The descent / era floors
        - The 3D world (desktop)
        - Audio / jukebox
        - The arcade / leaderboard
        - Somewhere else / not sure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser & device
      placeholder: 'e.g. Safari 17 on iPhone 14, or Chrome on a Windows laptop'
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, a screen recording, or the console output if you grabbed it.
    validations:
      required: false
