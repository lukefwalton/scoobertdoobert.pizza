name: CI

# Typecheck, build, and the full Playwright smoke suite on every PR and on pushes
# to main. This is the safety net the repo was missing: regressions in nav, audio,
# the JS-off storefront, etc. now fail here instead of silently shipping.

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # 30 (from 20): the runner has been demonstrably slow lately — the WebGL smoke
    # suite (esp. shoot:mainstreet's chained traversals) needs headroom so a slow
    # but PASSING run isn't killed mid-suite. Paired with the raised per-suite cap
    # in shoot-all.mjs.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Chromium only — the smoke scripts (and the audio/image render tooling)
      # drive headless Chromium; no need for firefox/webkit.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests (Vitest — pure logic)
        run: npm test

      - name: Build (+ post-build asset/notice checks)
        run: npm run build

      # shoot:all starts one `vite preview` and runs every shoot:* suite against
      # it (discovered from package.json, so new smokes are covered automatically).
      - name: Smoke suite
        run: npm run shoot:all

      # Keep failure screenshots for debugging a red run.
      - name: Upload smoke screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-shots
          path: .shots/
          if-no-files-found: ignore
          retention-days: 7
