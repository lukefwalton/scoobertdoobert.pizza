<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/png" href="/PIZZA.png" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="author" content="Luke Francis Walton" />

    <!-- Per-route title / canonical / description / og:url + og:title /
         og:description live in each page's <Head> (src/pages/*) so /text
         advertises itself as /text, not as the storefront. Only site-global
         tags stay in this shared template. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Scoobert Doobert" />
    <meta property="og:locale" content="en_US" />
    <!-- A purpose-built 1.91:1 (1200×630) social card so link unfurls aren't
         center-cropped. Generated by scripts/make-og-card.mjs from the square
         press photo; the square scoobert-og.jpg is still the JSON-LD entity image
         below (Google entity panels prefer square). -->
    <meta
      property="og:image"
      content="https://www.scoobertdoobert.pizza/press/scoobert-og-card.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Scoobert Doobert — googly eyes stuck to his face, one hand raised — beside the scoobertdoobert.pizza Electronic Pizza Storefront wordmark."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://www.scoobertdoobert.pizza/press/scoobert-og-card.jpg"
    />

    <link rel="me" href="https://lukefwalton.com/" />

    <!-- Identity + catalog graph, carried over from the previous site so the
         crawlable entity data survives the rebuild. The artist, person, podcast,
         and audiobook entities are canonically homed on the lukefwalton.com hub;
         we reuse those @ids here so the graph resolves to one creator, never a
         forked .pizza-homed copy. The Person node below is a hand-maintained
         MIRROR of personNode() in src/data/identity.ts (static HTML can't import
         TS) — keep its @id, alternateName, identifier, and sameAs in sync with
         that module, which the /about and /about/jp pages import. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://www.scoobertdoobert.pizza/#website",

            "alternateName": "scoobertdoobert.pizza",
            "url": "https://www.scoobertdoobert.pizza/",
            "description": "A pizza shop off the coast of San Diego. (It is actually a solo music project by a philosopher.)",
            "inLanguage": "en",
            "publisher": { "@id": "https://lukefwalton.com/#person" },
            "about": { "@id": "https://lukefwalton.com/#scoobert" }
          },
          {
            "@type": "MusicGroup",
            "@id": "https://lukefwalton.com/#scoobert",
            "name": "Scoobert Doobert",
            "description": "Self-produced San Diego indie pop, chill pop, alt-pop, funk, and lofi music project: nearly 300 compositions written, played, produced, and mixed by Scoobert himself. CHAI collaborator across Sub Pop and Sony Music Japan, with placements on NHK and Fuji TV; host of the Love Music More podcast; reader of Plato's dialogues in spoken-word audiobook form.",
            "disambiguatingDescription": "Music, podcast, and audio project of Luke Francis Walton. Not Luke Walton the NBA player and coach.",
            "image": "https://www.scoobertdoobert.pizza/press/scoobert-og.jpg",
            "genre": ["indie pop", "chill pop", "alt-pop", "funk", "lo-fi", "bedroom pop"],
            "foundingDate": "2006",
            "foundingLocation": { "@type": "Place", "name": "San Diego, California" },
            "location": { "@type": "Place", "name": "San Diego, California" },
            "recordLabel": { "@id": "https://lukefwalton.com/#beformer" },
            "award": "San Diego Music Award nomination (Big Hug)",
            "member": { "@id": "https://lukefwalton.com/#person" },
            "sameAs": [
              "https://open.spotify.com/artist/5zKkCi9E4L8p6aRiCSJVTn",
              "https://music.apple.com/us/artist/scoobert-doobert/1240946356",
              "https://scoobertdoobert.bandcamp.com/",
              "https://www.youtube.com/@scoobertdoobertburrito",
              "https://soundcloud.com/mrscoobertdoobert",

              "https://www.tiktok.com/@mr.scoobert_doobert",

              "https://koookooorooo.com/scoobert-doobert"
            ]
          },
          {
            "@type": "Person",
            "@id": "https://lukefwalton.com/#person",
            "name": "Luke F. Walton",
            "alternateName": [
              "Scoobert Doobert",
              "スクーバート・ドゥーバート",

              "ルーク・F・ウォルトン"

            "disambiguatingDescription": "American musician and record producer; recording name Scoobert Doobert — not the Scooby-Doo character.",
            "url": "https://lukefwalton.com/",

              { "@type": "PropertyValue", "propertyID": "ORCID", "value": "0009-0005-9263-1954" }
            ],
            "sameAs": [
              "https://lukefwalton.com/",
              "https://open.spotify.com/artist/5zKkCi9E4L8p6aRiCSJVTn",
              "https://music.apple.com/us/artist/scoobert-doobert/1240946356",
              "https://scoobertdoobert.bandcamp.com/",
              "https://soundcloud.com/mrscoobertdoobert",
              "https://www.youtube.com/@scoobertdoobertburrito",

          }

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
